    <title>GymOS — Workout Tracker</title>
    <script>
      // Pre-paint theme apply so there's no flash of the wrong theme.
      (function () {
        try {
          var m = localStorage.getItem("gymlog.theme.v1");
          var t = m === "light" || m === "dark" ? m
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", t);
          var l = localStorage.getItem("gymlog.locale.v1");
          document.documentElement.setAttribute("lang", l === "bg" ? "bg" : "en");
        } catch (e) {}
      })();
    </script>
