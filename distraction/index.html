<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Distraction Timer</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: rgba(255, 255, 255, 0.06);
            --surface2: rgba(255, 255, 255, 0.09);
            --text: #f0f0f5;
            --text2: #a0a0b8;
            --accent: #c9a84c;
            --accent2: #e0c874;
            --danger: #e05555;
            --border: rgba(255, 255, 255, 0.10);
            --border2: rgba(255, 255, 255, 0.16);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.04);
            --glass2: rgba(255, 255, 255, 0.07);
            --progress-bg: rgba(255, 255, 255, 0.06);
            --progress-fill: #4a90d9;
            --card-radius: 22px;
            --btn-radius: 26px;
            --transition: 0.28s cubic-bezier(0.25, 0.1, 0.25, 1);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
        }
        body.light-mode {
            --bg: #f0f2f5;
            --surface: rgba(0, 0, 0, 0.03);
            --surface2: rgba(0, 0, 0, 0.06);
            --text: #1a1a2e;
            --text2: #5a5a7a;
            --accent: #b88630;
            --accent2: #8b5e2b;
            --danger: #c0392b;
            --border: rgba(0, 0, 0, 0.08);
            --border2: rgba(0, 0, 0, 0.14);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --glass: rgba(255, 255, 255, 0.5);
            --glass2: rgba(255, 255, 255, 0.7);
            --progress-bg: rgba(0, 0, 0, 0.05);
            --progress-fill: #2d6fb0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.4s, color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app {
            width: 100%;
            height: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .glass-card2 {
            background: var(--glass2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border2);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
        }

        /* Setup Screen */
        #setup-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 12px;
            overflow-y: auto;
        }
        .setup-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            flex-shrink: 0;
        }
        .setup-top-bar .brand {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
        }
        .setup-top-bar .brand span {
            color: var(--accent);
        }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: scale(1.04);
        }
        .icon-btn svg {
            width: 17px;
            height: 17px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .lang-btn {
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            width: 42px;
        }

        /* Step Indicator */
        .step-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-shrink: 0;
            padding: 4px 0;
        }
        .step-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border2);
            transition: all var(--transition);
        }
        .step-dot.active {
            background: var(--accent);
            width: 20px;
            border-radius: 10px;
        }
        .step-dot.done {
            background: var(--accent);
            opacity: 0.5;
        }

        /* Wizard Card */
        #wizard-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px 24px 24px;
            gap: 20px;
            min-height: 340px;
            justify-content: center;
            transition: opacity 0.25s, transform 0.25s;
        }
        #wizard-card.fade-out {
            opacity: 0;
            transform: translateY(12px);
        }
        .wizard-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-align: center;
            color: var(--text);
            line-height: 1.3;
        }
        .wizard-subtitle {
            font-size: 0.78rem;
            color: var(--text2);
            text-align: center;
            letter-spacing: 0.03em;
            margin-top: -8px;
        }
        .option-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .option-btn {
            padding: 12px 18px;
            border-radius: var(--btn-radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            font-family: var(--font);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-btn:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: translateY(-1px);
        }
        .option-btn.selected {
            background: rgba(200, 160, 60, 0.12);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
            box-shadow: 0 0 20px rgba(200, 150, 50, 0.15);
        }
        .option-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            width: 100%;
        }
        .category-btn {
            padding: 14px 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            text-align: center;
        }
        .category-btn:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: translateY(-2px);
        }
        .category-btn.selected {
            background: rgba(200, 160, 60, 0.12);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
            box-shadow: 0 0 24px rgba(200, 150, 50, 0.15);
        }
        .category-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        .nav-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn-primary {
            padding: 14px 32px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #c9a84c, #a07828);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            font-family: var(--font);
            transition: all var(--transition);
            box-shadow: 0 6px 24px rgba(180, 130, 40, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(200, 150, 50, 0.4);
            background: linear-gradient(135deg, #dbb858, #b88630);
        }
        .btn-secondary {
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid var(--border2);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            font-family: var(--font);
            transition: all var(--transition);
        }
        .btn-secondary:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        /* Distraction Screen */
        #distraction-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            flex-direction: column;
            z-index: 50;
        }
        #distraction-screen.active {
            display: flex;
        }
        #progress-bar-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 100%;
            background: var(--progress-fill);
            transition: width 0.12s linear;
        }
        #progress-bar.warning {
            background: #e8a040;
            animation: pulse 0.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        #distraction-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        #time-badge {
            position: absolute;
            top: 14px;
            right: 56px;
            z-index: 102;
            font-size: 0.75rem;
            color: #bbb;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 5px 11px;
            border-radius: 16px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-family: var(--font);
            letter-spacing: 0.04em;
        }
        #skip-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            z-index: 105;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        #skip-btn:hover {
            background: rgba(220, 80, 70, 0.7);
            border-color: #e05555;
        }
        #skip-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Content styles */
        .text-content-wrap {
            text-align: center;
            padding: 30px 24px;
            max-width: 650px;
            width: 100%;
        }
        .text-content-wrap .main-text {
            font-size: clamp(1.1rem, 2.8vw, 1.6rem);
            font-weight: 500;
            color: #eee;
            line-height: 1.5;
            letter-spacing: 0.01em;
        }
        .text-content-wrap .reveal-text {
            margin-top: 20px;
            font-size: clamp(0.95rem, 2.2vw, 1.35rem);
            font-weight: 700;
            color: #e0c874;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.45s ease;
        }
        .text-content-wrap .reveal-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .text-content-wrap .reveal-hint {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 6px;
        }
        .millionaire-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 750px;
            padding: 16px;
            gap: 16px;
        }
        .millionaire-qbox {
            background: rgba(10, 14, 28, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            padding: 18px 22px;
            text-align: center;
            width: 100%;
        }
        .millionaire-qbox .q-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #889;
            margin-bottom: 6px;
        }
        .millionaire-answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }
        .millionaire-ans {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 12px;
            background: rgba(18, 26, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.35s;
        }
        .millionaire-ans .ans-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1a3050;
            border: 2px solid #345880;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.78rem;
            flex-shrink: 0;
            transition: all 0.35s;
        }
        .millionaire-ans.correct-glow {
            border-color: #c9a84c !important;
            background: rgba(180, 140, 40, 0.18) !important;
            box-shadow: 0 0 28px rgba(200, 150, 50, 0.35);
        }
        .millionaire-ans.correct-glow .ans-circle {
            background: #c9a84c !important;
            border-color: #e0c874 !important;
            color: #1a0e00 !important;
        }
        .video-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .video-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
        #visuals-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #times-up-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #times-up-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        #times-up-overlay .times-up-text {
            font-size: 2.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            animation: popIn 0.4s ease-out;
        }
        @keyframes popIn {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }
            70% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .category-btn {
                padding: 10px 6px;
                font-size: 0.75rem;
                gap: 4px;
                border-radius: 12px;
            }
            .category-btn svg {
                width: 16px;
                height: 16px;
            }
            .wizard-title {
                font-size: 1.2rem;
            }
            .option-btn {
                padding: 10px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- SETUP SCREEN -->
        <div id="setup-screen">
            <div class="setup-top-bar">
                <div class="brand">Distraction<span>Timer</span></div>
                <div style="display:flex;gap:6px;">
                    <button class="icon-btn" id="theme-toggle" title="Toggle theme">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    </button>
                    <button class="icon-btn lang-btn" id="lang-toggle">EN</button>
                </div>
            </div>
            <div class="step-dots" id="step-dots">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
            </div>
            <div class="glass-card2" id="wizard-card"></div>
            <div class="nav-btns" id="nav-btns"></div>
        </div>
        <!-- DISTRACTION SCREEN -->
        <div id="distraction-screen">
            <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
            <div id="time-badge"></div>
            <button id="skip-btn" title="Skip"><svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
            <div id="distraction-content"></div>
        </div>
        <div id="times-up-overlay"><div class="times-up-text" id="times-up-msg">Time's Up</div></div>
    </div>

                    html = `
                <div class="wizard-title">${t('step2Title')}</div>
                <div class="wizard-subtitle">${t('step2Sub')}</div>
                <div class="category-grid">${cats.map(c=>{
                  return `<button class="category-btn${distractionType===c.type?' selected':''}" data-type="${c.type}">${iconSvgs[c.icon]} ${t(c.type)}</button>`;
                }).join('')}</div>`;
                }
                wizardCard.innerHTML = html;
                wizardCard.classList.remove('fade-out');
                renderNavButtons();
                bindWizardEvents();
            }

            function updateStepDots() {
                let dots = '';
                for (let i = 0; i < TOTAL_STEPS; i++) {
                    let cls = '';
                    if (i === wizardStep) cls = 'active';
                    else if (i < wizardStep) cls = 'done';
                    dots += `<div class="step-dot ${cls}"></div>`;
                }
                stepDots.innerHTML = dots;
            }

            function renderNavButtons() {
                let html = '';
                if (wizardStep > 0) html +=
                    `<button class="btn-secondary" id="btn-back">${t('back')}</button>`;
                if (wizardStep < TOTAL_STEPS - 1) html +=
                    `<button class="btn-primary" id="btn-next">${t('next')}</button>`;
                else html += `<button class="btn-primary" id="btn-start">${t('start')}</button>`;
                navBtns.innerHTML = html;
                const btnBack = document.getElementById('btn-back');
                const btnNext = document.getElementById('btn-next');
                const btnStart = document.getElementById('btn-start');
                if (btnBack) btnBack.addEventListener('click', () => {
                    if (wizardStep > 0) { wizardStep--;
                        transitionWizard(); }
                });
                if (btnNext) btnNext.addEventListener('click', () => {
                    if (wizardStep < TOTAL_STEPS - 1) { wizardStep++;
                        transitionWizard(); }
                });
                if (btnStart) btnStart.addEventListener('click', startDistraction);
            }

            function transitionWizard() {
                wizardCard.classList.add('fade-out');
                setTimeout(() => { renderWizard();
                    wizardCard.classList.remove('fade-out'); }, 200);
            }

            function bindWizardEvents() {
                wizardCard.querySelectorAll('.option-btn[data-time]').forEach(b => {
                    b.addEventListener('click', () => {
                        timerDuration = parseInt(b.dataset.time);
                        renderWizard();
                    });
                });
                wizardCard.querySelectorAll('.option-btn[data-dur]').forEach(b => {
                    b.addEventListener('click', () => {
                        textDistractionDuration = parseInt(b.dataset.dur);
                        renderWizard();
                    });
                });
                wizardCard.querySelectorAll('.category-btn[data-type]').forEach(b => {
                    b.addEventListener('click', () => {
                        distractionType = b.dataset.type;
                        renderWizard();
                    });
                });
            }

            // ─────────────────── HELPERS ───────────────────
            function getData() { return currentLang === 'bg' ? dataBg : dataEn; }

            function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math
                    .floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]]; } return a; }

            function resolveType() {
                if (distractionType !== 'random') return distractionType;
                const all = [...TEXT_TYPES, ...VIDEO_TYPES, 'visuals'];
                return all[Math.floor(Math.random() * all.length)];
            }

            function getVideoPool(type) {
                if (type === 'shorts') return shortVideos;
                if (type === 'music') return musicVideos;
                if (type === 'hiddencam') return hiddenCamVideos;
                if (type === 'fitness') return fitnessVideos;
                return [];
            }

            function formatTime(sec) {
                const s = Math.ceil(Math.max(0, sec));
                return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            }

            // ─────────────────── RENDER CONTENT ───────────────────
            function renderTextItem(item, type) {
                distractionContent.innerHTML = '';
                if (['questions', 'movies', 'popculture'].includes(type)) {
                    distractionContent.innerHTML = `
                <div class="millionaire-wrap">
                  <div class="millionaire-qbox"><div class="q-label">${t('qLabel')}</div><div class="main-text">${item.q}</div></div>
                  <div class="millionaire-answers">${item.answers.map((a,i)=>`<div class="millionaire-ans" data-idx="${i}"><span class="ans-circle">${String.fromCharCode(65+i)}</span><span>${a}</span></div>`).join('')}</div>
                </div>`;
                } else if (type === 'riddles') {
                    distractionContent.innerHTML = `
                <div class="text-content-wrap">
                  <p class="main-text">${item.riddle}</p>
                  <div class="reveal-hint">${t('revealHint')}</div>
                  <p class="reveal-text" id="reveal-text">${item.answer}</p>
                </div>`;
                } else if (type === 'jokes') {
                    distractionContent.innerHTML = `
                <div class="text-content-wrap">
                  <p class="main-text">${item.setup}</p>
                  <div class="reveal-hint">${t('revealHint')}</div>
                  <p class="reveal-text" id="reveal-text">${item.punchline}</p>
                </div>`;
                }
            }

            function revealCurrentText(type) {
                if (['questions', 'movies', 'popculture'].includes(type)) {
                    const item = shuffledItems[currentShuffleIndex];
                    document.querySelectorAll('.millionaire-ans').forEach((el, i) => {
                        if (i === item.correct) el.classList.add('correct-glow');
                        else el.style.opacity = '0.4';
                    });
                } else if (type === 'riddles' || type === 'jokes') {
                    const rev = document.getElementById('reveal-text');
                    if (rev && !rev.classList.contains('visible')) rev.classList.add('visible');
                }
            }

            function embedVideo(video) {
                const container = document.getElementById('video-container');
                if (!container) return;
                container.innerHTML =
                    `<iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&enablejsapi=1&cc_load_policy=0&playsinline=1" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation" style="width:100%;height:100%;border:none;pointer-events:none;"></iframe>`;
            }

            function scheduleNextVideo() {
                if (!VIDEO_TYPES.includes(resolvedType) || timeRemaining <= 0) return;
                if (videoTimeout) clearTimeout(videoTimeout);
                currentShuffleIndex++;
                if (currentShuffleIndex >= shuffledItems.length) {
                    shuffledItems = shuffle(shuffledItems);
                    currentShuffleIndex = 0;
                }
                const nextVideo = shuffledItems[currentShuffleIndex];
                const delay = Math.min(nextVideo.duration * 1000, timeRemaining * 1000);
                if (delay < 2000) return;
                videoTimeout = setTimeout(() => {
                    if (timeRemaining <= 0) return;
                    embedVideo(nextVideo);
                    scheduleNextVideo();
                }, delay);
            }

            // ─────────────────── START DISTRACTION ───────────────────
            function startDistraction() {
                resolvedType = resolveType();
                totalTime = timerDuration;
                timeRemaining = totalTime;
                shuffledItems = [];
                currentShuffleIndex = 0;
                segmentStartTime = 0;
                if (videoTimeout) { clearTimeout(videoTimeout);
                    videoTimeout = null; }
                if (animFrame) { cancelAnimationFrame(animFrame);
                    animFrame = null; }

                if (TEXT_TYPES.includes(resolvedType)) {
                    const data = getData();
                    const rawItems = data[resolvedType] || [];
                    shuffledItems = shuffle(rawItems);
                    currentShuffleIndex = 0;
                    renderTextItem(shuffledItems[0], resolvedType);
                } else if (VIDEO_TYPES.includes(resolvedType)) {
                    const pool = getVideoPool(resolvedType);
                    shuffledItems = shuffle(pool);
                    currentShuffleIndex = 0;
                    distractionContent.innerHTML =
                        `<div class="video-wrap" id="video-container">Loading...</div>`;
                    embedVideo(shuffledItems[0]);
                    scheduleNextVideo();
                } else if (resolvedType === 'visuals') {
                    distractionContent.innerHTML = `<canvas id="visuals-canvas"></canvas>`;
                    const canvas = document.getElementById('visuals-canvas');
                    if (canvas) { canvas.width = distractionContent.clientWidth;
                        canvas.height = distractionContent.clientHeight; }
                    startVisuals();
                }

                setupScreen.style.display = 'none';
                distractionScreen.classList.add('active');
                progressBar.style.width = '100%';
                progressBar.classList.remove('warning');
                timeBadge.textContent = formatTime(timeRemaining);
                timesUpOverlay.classList.remove('show');

                const startTime = performance.now();
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    timeRemaining = Math.max(0, totalTime - elapsed);
                    progressBar.style.width = (timeRemaining / totalTime * 100) + '%';
                    if (timeRemaining <= 5 && timeRemaining > 0) progressBar.classList.add(
                        'warning');
                    else progressBar.classList.remove('warning');
                    timeBadge.textContent = formatTime(timeRemaining);

                    if (TEXT_TYPES.includes(resolvedType) && shuffledItems.length > 0) {
                        const elapsedSec = totalTime - timeRemaining;
                        const segIdx = Math.floor(elapsedSec / textDistractionDuration);
                        if (segIdx !== currentShuffleIndex) {
                            currentShuffleIndex = segIdx;
                            if (currentShuffleIndex >= shuffledItems.length) {
                                shuffledItems = shuffle(shuffledItems);
                                currentShuffleIndex = 0;
                            }
                            renderTextItem(shuffledItems[currentShuffleIndex], resolvedType);
                            segmentStartTime = segIdx * textDistractionDuration;
                        }
                        const segStart = currentShuffleIndex * textDistractionDuration;
                        const segRemaining = (segStart + textDistractionDuration) - elapsedSec;
                        if (segRemaining <= 5 && segRemaining > 0) {
                            revealCurrentText(resolvedType);
                        }
                    }

                    if (timeRemaining <= 0) endDistraction(false);
                }, 80);
            }

            function endDistraction(skipped = false) {
                if (timerInterval) clearInterval(timerInterval);
                if (videoTimeout) clearTimeout(videoTimeout);
                if (animFrame) cancelAnimationFrame(animFrame);
                timerInterval = null;
                videoTimeout = null;
                animFrame = null;
                progressBar.style.width = '0%';
                progressBar.classList.remove('warning');
                timeBadge.textContent = '0:00';
                timesUpMsg.textContent = t('timesUp');
                timesUpOverlay.classList.add('show');
                setTimeout(() => {
                    timesUpOverlay.classList.remove('show');
                    distractionScreen.classList.remove('active');
                    distractionContent.innerHTML = '';
                    setupScreen.style.display = 'flex';
                    progressBar.style.width = '100%';
                    shuffledItems = [];
                }, 1800);
            }

            skipBtn.addEventListener('click', () => { if (timerInterval) endDistraction(true); });

            // ─────────────────── VISUALS ───────────────────
            function startVisuals() {
                const canvas = document.getElementById('visuals-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = distractionContent.clientWidth;
                    canvas.height = distractionContent.clientHeight; };
                resize();
                window.addEventListener('resize', resize);
                particles = [];
                for (let i = 0; i < 80; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() *
                        canvas.height, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5, r: Math
                        .random() * 3 + 1, hue: Math.random() * 360 });

                function animate() {
                    if (!document.getElementById('visuals-canvas')) return;
                    resize();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000a18';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.x += p.vx;
                        p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p
                            .y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                        p.hue = (p.hue + 0.2) % 360; });
                    for (let i = 0; i < particles.length; i++)
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x,
                                dy = particles[i].y - particles[j].y,
                                dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 90) { ctx.strokeStyle =
                                    `hsla(${particles[i].hue},70%,60%,${0.25*(1-dist/90)})`;
                                ctx.lineWidth = 0.6;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke(); }
                        }
                    particles.forEach(p => { ctx.fillStyle = `hsla(${p.hue},80%,65%,0.9)`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill(); });
                    animFrame = requestAnimationFrame(animate);
                }
                animFrame = requestAnimationFrame(animate);
            }

            // ─────────────────── INIT ───────────────────
            applyTheme();
            renderWizard();
            langToggle.textContent = 'EN';
        })();
    </script>
</body>
</html>
