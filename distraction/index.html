<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Distraction Timer</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: rgba(255, 255, 255, 0.05);
            --surface2: rgba(255, 255, 255, 0.09);
            --text: #f0f0f5;
            --text2: #a0a0b8;
            --accent: #c9a84c;
            --accent2: #e0c874;
            --border: rgba(255, 255, 255, 0.09);
            --border2: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            --glass: rgba(255, 255, 255, 0.04);
            --glass2: rgba(255, 255, 255, 0.07);
            --progress-bg: rgba(255, 255, 255, 0.06);
            --progress-fill: #4a90d9;
            --card-radius: 22px;
            --btn-radius: 26px;
            --transition: 0.28s cubic-bezier(0.25, 0.1, 0.25, 1);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
        }
        body.light-mode {
            --bg: #f0f2f5;
            --surface: rgba(0, 0, 0, 0.03);
            --surface2: rgba(0, 0, 0, 0.06);
            --text: #1a1a2e;
            --text2: #5a5a7a;
            --accent: #b88630;
            --accent2: #8b5e2b;
            --border: rgba(0, 0, 0, 0.08);
            --border2: rgba(0, 0, 0, 0.13);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
            --glass: rgba(255, 255, 255, 0.5);
            --glass2: rgba(255, 255, 255, 0.7);
            --progress-bg: rgba(0, 0, 0, 0.05);
            --progress-fill: #2d6fb0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.4s, color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #app {
            width: 100%;
            height: 100%;
            max-width: 620px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .glass-card2 {
            background: var(--glass2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border2);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
        }

        #setup-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 16px 20px;
            gap: 8px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .setup-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            flex-shrink: 0;
        }
        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text);
        }
        .brand span {
            color: var(--accent);
        }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: scale(1.04);
        }
        .icon-btn svg {
            width: 17px;
            height: 17px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .lang-btn {
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            width: 42px;
        }

        .setup-card {
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }
        .setup-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .setup-section .section-question {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
            line-height: 1.3;
        }
        .setup-section .section-hint {
            font-size: 0.72rem;
            color: var(--text2);
            letter-spacing: 0.03em;
            margin-top: -6px;
        }
        .option-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .option-btn {
            padding: 10px 16px;
            border-radius: var(--btn-radius);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            font-family: var(--font);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .option-btn:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: translateY(-1px);
        }
        .option-btn.selected {
            background: rgba(200, 160, 60, 0.12);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
            box-shadow: 0 0 20px rgba(200, 150, 50, 0.12);
        }
        .option-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .category-btn {
            padding: 12px 8px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            text-align: center;
        }
        .category-btn:hover {
            background: var(--surface2);
            border-color: var(--border2);
            transform: translateY(-2px);
        }
        .category-btn.selected {
            background: rgba(200, 160, 60, 0.12);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
            box-shadow: 0 0 24px rgba(200, 150, 50, 0.12);
        }
        .category-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
        #start-btn {
            padding: 15px 32px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #c9a84c, #a07828);
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            font-family: var(--font);
            transition: all var(--transition);
            box-shadow: 0 6px 24px rgba(180, 130, 40, 0.3);
            width: 100%;
            margin-top: 4px;
        }
        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(200, 150, 50, 0.4);
            background: linear-gradient(135deg, #dbb858, #b88630);
        }

        #distraction-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            flex-direction: column;
            z-index: 50;
        }
        #distraction-screen.active {
            display: flex;
        }
        #progress-bar-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            z-index: 100;
        }
        #progress-bar {
            height: 100%;
            width: 100%;
            background: var(--progress-fill);
            transition: width 0.12s linear;
        }
        #progress-bar.warning {
            background: #e8a040;
            animation: pulse 0.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        #distraction-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        #time-badge {
            position: absolute;
            top: 14px;
            right: 56px;
            z-index: 102;
            font-size: 0.75rem;
            color: #bbb;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 5px 11px;
            border-radius: 16px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-family: var(--font);
            letter-spacing: 0.04em;
        }
        #skip-btn {
            position: absolute;
            top: 12px;
            right: 14px;
            z-index: 105;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        #skip-btn:hover {
            background: rgba(220, 80, 70, 0.7);
            border-color: #e05555;
        }
        #skip-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .text-content-wrap {
            text-align: center;
            padding: 30px 24px;
            max-width: 650px;
            width: 100%;
        }
        .text-content-wrap .main-text {
            font-size: clamp(1.1rem, 2.8vw, 1.55rem);
            font-weight: 500;
            color: #eee;
            line-height: 1.5;
            letter-spacing: 0.01em;
        }
        .text-content-wrap .reveal-text {
            margin-top: 20px;
            font-size: clamp(0.95rem, 2.2vw, 1.3rem);
            font-weight: 700;
            color: #e0c874;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.45s ease;
        }
        .text-content-wrap .reveal-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .text-content-wrap .reveal-hint {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
            margin-bottom: 6px;
        }
        .millionaire-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 750px;
            padding: 16px;
            gap: 16px;
        }
        .millionaire-qbox {
            background: rgba(10, 14, 28, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            padding: 18px 22px;
            text-align: center;
            width: 100%;
        }
        .millionaire-qbox .q-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #889;
            margin-bottom: 6px;
        }
        .millionaire-answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }
        .millionaire-ans {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border-radius: 12px;
            background: rgba(18, 26, 50, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.35s;
        }
        .millionaire-ans .ans-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1a3050;
            border: 2px solid #345880;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.78rem;
            flex-shrink: 0;
            transition: all 0.35s;
        }
        .millionaire-ans.correct-glow {
            border-color: #c9a84c !important;
            background: rgba(180, 140, 40, 0.18) !important;
            box-shadow: 0 0 28px rgba(200, 150, 50, 0.35);
        }
        .millionaire-ans.correct-glow .ans-circle {
            background: #c9a84c !important;
            border-color: #e0c874 !important;
            color: #1a0e00 !important;
        }
        .video-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .video-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
        #visuals-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #times-up-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        #times-up-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        #times-up-overlay .times-up-text {
            font-size: 2.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            animation: popIn 0.4s ease-out;
        }
        @keyframes popIn {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }
            70% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .category-btn {
                padding: 10px 4px;
                font-size: 0.72rem;
                gap: 3px;
                border-radius: 10px;
            }
            .category-btn svg {
                width: 15px;
                height: 15px;
            }
            .setup-card {
                padding: 16px 14px;
                gap: 14px;
            }
            .section-question {
                font-size: 0.95rem !important;
            }
            .option-btn {
                padding: 8px 12px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>

                    { riddle: "Какво винаги е пред теб, но не можеш да го видиш?", answer: "Бъдещето" },
                ],
                jokes: [
                    { setup: "Защо учените не вярват на атомите?", punchline: "Защото те съставят всичко!" },
                    { setup: "Какво казва фалшивата юфка?", punchline: "Аз съм имитация!" },
                    { setup: "Защо плашилото спечели награда?",
                    punchline: "Беше изключително в полето си!" },
                    { setup: "Какво казва мечката без зъби?", punchline: "Мече с дъвка!" },
                    { setup: "Защо яйцата не разказват вицове?", punchline: "Ще се спукат от смях!" },
                    { setup: "Какво каза океанът на плажа?", punchline: "Нищо, само махна." },
                    { setup: "Защо колелото падна?", punchline: "Беше двуизморено." },
                    { setup: "Какво казва сиренето, което не е твое?", punchline: "Не е твое сирене." },
                    { setup: "Защо леопардът не може да се скрие?", punchline: "Защото винаги е на петна." },
                    { setup: "Коя е най-нелюбимата стая на скелета?", punchline: "Дневната." },
                    { setup: "Защо учебникът по математика беше тъжен?", punchline: "Имаше твърде много задачи." },
                    { setup: "Какво казва прасето, което тренира карате?", punchline: "Свински котлет." },
                    { setup: "Защо кафето подаде сигнал в полицията?", punchline: "Беше ограбено." },
                    { setup: "Как пингвинът строи къщата си?", punchline: "С иглу." },
                    { setup: "Защо доматът се изчерви?", punchline: "Защото видя дресинга за салата." },
                ],
                movies: [
                    { q: "Кой филм печели Оскар 1994?", answers: ["Криминале", "Форест Гъмп",
                            "Изкуплението Шоушенк", "Цар Лъв"
                        ], correct: 1 },
                    { q: "Кой режисира Извънземното?", answers: ["Спилбърг", "Лукас", "Камерън", "Скот"],
                        correct: 0 },
                    { q: "В Матрицата Нео взима...", answers: ["Синьо", "Червено", "Зелено", "Жълто"],
                    correct: 1 },
                    { q: "Фродо от Властелинът?", answers: ["Торбинс", "Грабове", "Брендифут", "Тук"],
                    correct: 0 },
                    { q: "Олаф от кой филм?", answers: ["Рапунцел", "Замръзнало", "Моана", "Храбро"],
                    correct: 1 },
                    { q: "Жокера 2008 играе...", answers: ["Леджър", "Никълсън", "Лето", "Финикс"], correct: 0 },
                    { q: "Нека Силата бъде...", answers: ["силна", "с теб", "вечна", "вътре"], correct: 1 },
                ],
                popculture: [
                    { q: "Кой издава Thriller?", answers: ["Принс", "Майкъл Джексън", "Мадона", "Уитни"],
                        correct: 1 },
                    { q: "Първи iPhone година?", answers: ["2005", "2006", "2007", "2008"], correct: 2 },
                    { q: "Приложение с призрак?", answers: ["Snapchat", "Instagram", "TikTok", "Twitter"],
                        correct: 0 },
                    { q: "Кралица на попа?", answers: ["Гага", "Мадона", "Бионсе", "Риана"], correct: 1 },
                    { q: "Професия на Марио?", answers: ["Водопроводчик", "Дърводелец", "Електрик",
                        "Бояджия"], correct: 0 },
                    { q: "Дракони в...", answers: ["Вещерът", "Игра на тронове", "Властелинът",
                        "Хари Потър"], correct: 1 },
                ],
            };

            // ─────────────────── STATE ───────────────────
            let currentLang = 'en';
            let theme = 'dark';
            let timerDuration = 60;
            let textDistractionDuration = 30;
            let distractionType = 'random';
            let timerInterval = null;
            let animFrame = null;
            let timeRemaining = 0;
            let totalTime = 0;
            let resolvedType = null;
            let shuffledItems = [];
            let currentShuffleIndex = 0;
            let particles = [];
            const TEXT_TYPES = ['questions', 'riddles', 'jokes', 'movies', 'popculture'];
            const VIDEO_TYPES = ['shorts', 'music', 'hiddencam', 'fitness'];

            // ─────────────────── I18N ───────────────────
            const i18n = {
                en: {
                    qTime: "How long should the timer run?",
                    hTime: "Pick your total wait duration",
                    qRefresh: "How often should content refresh?",
                    hRefresh: "For text‑based distractions only",
                    qCat: "What would you like to do?",
                    hCat: "Choose your distraction category",
                    start: "Start Timer",
                    timesUp: "Time's Up",
                    sec: "s",
                    min: "m",
                    questions: "Questions",
                    riddles: "Riddles",
                    jokes: "Jokes",
                    moviesTrivia: "Movies",
                    popCulture: "Pop Culture",
                    shorts: "Shorts",
                    music: "Music",
                    hiddenCam: "Hidden Cam",
                    fitness: "Fitness",
                    visuals: "Visuals",
                    random: "Random",
                    skipTitle: "Skip",
                    revealHint: "Reveals soon...",
                    qLabel: "Question",
                },
                bg: {
                    qTime: "Колко време да тече таймерът?",
                    hTime: "Избери обща продължителност",
                    qRefresh: "На колко често да се сменя съдържанието?",
                    hRefresh: "Само за текстови категории",
                    qCat: "Какво искаш да правиш?",
                    hCat: "Избери категория",
                    start: "Старт",
                    timesUp: "Времето изтече",
                    sec: "с",
                    min: "м",
                    questions: "Въпроси",
                    riddles: "Гатанки",
                    jokes: "Вицове",
                    moviesTrivia: "Филми",
                    popCulture: "Поп култура",
                    shorts: "Shorts",
                    music: "Музика",
                    hiddenCam: "Скрита камера",
                    fitness: "Фитнес",
                    visuals: "Визуализации",
                    random: "Случайно",
                    skipTitle: "Пропусни",
                    revealHint: "Отговор скоро...",
                    qLabel: "Въпрос",
                },
            };

            function t(key) { return i18n[currentLang][key] || key; }

            // ─────────────────── DOM ───────────────────
            const setupScreen = document.getElementById('setup-screen');
            const distractionScreen = document.getElementById('distraction-screen');
            const progressBar = document.getElementById('progress-bar');
            const distractionContent = document.getElementById('distraction-content');
            const timeBadge = document.getElementById('time-badge');
            const timesUpOverlay = document.getElementById('times-up-overlay');
            const timesUpMsg = document.getElementById('times-up-msg');
            const skipBtn = document.getElementById('skip-btn');
            const themeToggle = document.getElementById('theme-toggle');
            const langToggle = document.getElementById('lang-toggle');
            const startBtn = document.getElementById('start-btn');

            // ─────────────────── THEME ───────────────────
            function applyTheme() {
                if (theme === 'light') document.body.classList.add('light-mode');
                else document.body.classList.remove('light-mode');
            }
            themeToggle.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark';
                applyTheme(); });

            // ─────────────────── RENDER SETUP ───────────────────
            function renderSetup() {
                document.getElementById('q-time').textContent = t('qTime');
                document.getElementById('h-time').textContent = t('hTime');
                document.getElementById('q-refresh').textContent = t('qRefresh');
                document.getElementById('h-refresh').textContent = t('hRefresh');
                document.getElementById('q-cat').textContent = t('qCat');
                document.getElementById('h-cat').textContent = t('hCat');
                startBtn.textContent = t('start');

                const timeOpts = document.getElementById('time-options');
                timeOpts.innerHTML = [30, 60, 90, 120, 180, 300].map(v => {
                    const label = v < 60 ? `${v}${t('sec')}` : v === 60 ? `1${t('min')}` :
                        `${v/60}${t('min')}`;
                    return `<button class="option-btn${timerDuration===v?' selected':''}" data-time="${v}">${label}</button>`;
                }).join('');

                const durOpts = document.getElementById('duration-options');
                durOpts.innerHTML = [15, 30, 45, 60].map(v =>
                    `<button class="option-btn${textDistractionDuration===v?' selected':''}" data-dur="${v}">${v}${t('sec')}</button>`
                ).join('');

                const catOpts = document.getElementById('category-options');
                const cats = [
                    { type: 'questions', icon: 'speech' }, { type: 'riddles', icon: 'puzzle' },
                    { type: 'jokes', icon: 'smile' }, { type: 'movies', icon: 'film' },
                    { type: 'popculture', icon: 'star' }, { type: 'shorts', icon: 'play' },
                    { type: 'music', icon: 'note' }, { type: 'hiddencam', icon: 'eye' },
                    { type: 'fitness', icon: 'dumbbell' }, { type: 'visuals', icon: 'shapes' },
                    { type: 'random', icon: 'shuffle' },
                ];
                const icons = {
                    speech: '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
                    puzzle: '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>',
                    smile: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="0.5" fill="currentColor"/><circle cx="15" cy="9" r="0.5" fill="currentColor"/></svg>',
                    film: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',
                    star: '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>',
                    play: '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg>',
                    note: '<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
                    eye: '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>',
                    dumbbell: '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/><rect x="2" y="8" width="4" height="8" rx="1.5"/><rect x="18" y="8" width="4" height="8" rx="1.5"/></svg>',
                    shapes: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>',
                    shuffle: '<svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>',
                };
                catOpts.innerHTML = cats.map(c =>
                    `<button class="category-btn${distractionType===c.type?' selected':''}" data-type="${c.type}">${icons[c.icon]} ${t(c.type)}</button>`
                ).join('');

                bindSetupEvents();
            }

            function bindSetupEvents() {
                document.querySelectorAll('#time-options .option-btn').forEach(b => {
                    b.addEventListener('click', () => { timerDuration = parseInt(b.dataset.time);
                        renderSetup(); });
                });
                document.querySelectorAll('#duration-options .option-btn').forEach(b => {
                    b.addEventListener('click', () => { textDistractionDuration = parseInt(b.dataset
                            .dur);
                        renderSetup(); });
                });
                document.querySelectorAll('#category-options .category-btn').forEach(b => {
                    b.addEventListener('click', () => { distractionType = b.dataset.type;
                        renderSetup(); });
                });
            }

            langToggle.addEventListener('click', () => {
                currentLang = currentLang === 'en' ? 'bg' : 'en';
                langToggle.textContent = currentLang === 'en' ? 'EN' : 'BG';
                renderSetup();
            });

            startBtn.addEventListener('click', startDistraction);
            skipBtn.addEventListener('click', () => { if (timerInterval) endDistraction(true); });

            // ─────────────────── HELPERS ───────────────────
            function getData() { return currentLang === 'bg' ? dataBg : dataEn; }

            function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math
                    .floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]]; } return a; }

            function resolveType() {
                if (distractionType !== 'random') return distractionType;
                const all = [...TEXT_TYPES, ...VIDEO_TYPES, 'visuals'];
                return all[Math.floor(Math.random() * all.length)];
            }

            function getVideoPool(type) {
                if (type === 'shorts') return shortVideos;
                if (type === 'music') return musicVideos;
                if (type === 'hiddencam') return hiddenCamVideos;
                if (type === 'fitness') return fitnessVideos;
                return [];
            }

            function formatTime(sec) { const s = Math.ceil(Math.max(0, sec)); return `${Math.floor(s/60)}:${(s%60)
                    .toString().padStart(2,'0')}`; }

            // ─────────────────── RENDER CONTENT ───────────────────
            function renderTextItem(item, type) {
                distractionContent.innerHTML = '';
                if (['questions', 'movies', 'popculture'].includes(type)) {
                    distractionContent.innerHTML = `
                <div class="millionaire-wrap">
                  <div class="millionaire-qbox"><div class="q-label">${t('qLabel')}</div><div style="font-size:1.2rem;color:#eee;">${item.q}</div></div>
                  <div class="millionaire-answers">${item.answers.map((a,i)=>`<div class="millionaire-ans" data-idx="${i}"><span class="ans-circle">${String.fromCharCode(65+i)}</span><span>${a}</span></div>`).join('')}</div>
                </div>`;
                } else if (type === 'riddles') {
                    distractionContent.innerHTML = `
                <div class="text-content-wrap">
                  <p class="main-text">${item.riddle}</p>
                  <div class="reveal-hint">${t('revealHint')}</div>
                  <p class="reveal-text" id="reveal-text">${item.answer}</p>
                </div>`;
                } else if (type === 'jokes') {
                    distractionContent.innerHTML = `
                <div class="text-content-wrap">
                  <p class="main-text">${item.setup}</p>
                  <div class="reveal-hint">${t('revealHint')}</div>
                  <p class="reveal-text" id="reveal-text">${item.punchline}</p>
                </div>`;
                }
            }

            function revealCurrentText(type) {
                if (['questions', 'movies', 'popculture'].includes(type)) {
                    const item = shuffledItems[currentShuffleIndex];
                    document.querySelectorAll('.millionaire-ans').forEach((el, i) => {
                        if (i === item.correct) el.classList.add('correct-glow');
                        else el.style.opacity = '0.4';
                    });
                } else if (type === 'riddles' || type === 'jokes') {
                    const rev = document.getElementById('reveal-text');
                    if (rev && !rev.classList.contains('visible')) rev.classList.add('visible');
                }
            }

            function buildPlaylistEmbed(pool) {
                if (pool.length === 0) return '';
                const firstId = pool[0].id;
                const restIds = pool.slice(1).map(v => v.id).join(',');
                const playlistParam = restIds ? `&playlist=${restIds}` : '';
                return `https://www.youtube.com/embed/${firstId}?autoplay=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&enablejsapi=1&cc_load_policy=0&playsinline=1${playlistParam}`;
            }

            // ─────────────────── START DISTRACTION ───────────────────
            function startDistraction() {
                resolvedType = resolveType();
                totalTime = timerDuration;
                timeRemaining = totalTime;
                shuffledItems = [];
                currentShuffleIndex = 0;
                if (animFrame) { cancelAnimationFrame(animFrame);
                    animFrame = null; }

                if (TEXT_TYPES.includes(resolvedType)) {
                    const data = getData();
                    const rawItems = data[resolvedType] || [];
                    shuffledItems = shuffle(rawItems);
                    currentShuffleIndex = 0;
                    renderTextItem(shuffledItems[0], resolvedType);
                } else if (VIDEO_TYPES.includes(resolvedType)) {
                    const pool = getVideoPool(resolvedType);
                    shuffledItems = shuffle(pool);
                    const embedUrl = buildPlaylistEmbed(shuffledItems);
                    distractionContent.innerHTML =
                        `<div class="video-wrap"><iframe src="${embedUrl}" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation" style="width:100%;height:100%;border:none;pointer-events:none;"></iframe></div>`;
                } else if (resolvedType === 'visuals') {
                    distractionContent.innerHTML = `<canvas id="visuals-canvas"></canvas>`;
                    const canvas = document.getElementById('visuals-canvas');
                    if (canvas) { canvas.width = distractionContent.clientWidth;
                        canvas.height = distractionContent.clientHeight; }
                    startVisuals();
                }

                setupScreen.style.display = 'none';
                distractionScreen.classList.add('active');
                progressBar.style.width = '100%';
                progressBar.classList.remove('warning');
                timeBadge.textContent = formatTime(timeRemaining);
                timesUpOverlay.classList.remove('show');

                const startTime = performance.now();
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    timeRemaining = Math.max(0, totalTime - elapsed);
                    progressBar.style.width = (timeRemaining / totalTime * 100) + '%';
                    if (timeRemaining <= 5 && timeRemaining > 0) progressBar.classList.add(
                        'warning');
                    else progressBar.classList.remove('warning');
                    timeBadge.textContent = formatTime(timeRemaining);

                    if (TEXT_TYPES.includes(resolvedType) && shuffledItems.length > 0) {
                        const elapsedSec = totalTime - timeRemaining;
                        const segIdx = Math.floor(elapsedSec / textDistractionDuration);
                        if (segIdx !== currentShuffleIndex) {
                            currentShuffleIndex = segIdx;
                            if (currentShuffleIndex >= shuffledItems.length) {
                                shuffledItems = shuffle(shuffledItems);
                                currentShuffleIndex = 0;
                            }
                            renderTextItem(shuffledItems[currentShuffleIndex], resolvedType);
                        }
                        const segStart = currentShuffleIndex * textDistractionDuration;
                        const segRemaining = (segStart + textDistractionDuration) - elapsedSec;
                        if (segRemaining <= 5 && segRemaining > 0) revealCurrentText(resolvedType);
                    }

                    if (timeRemaining <= 0) endDistraction(false);
                }, 80);
            }

            function endDistraction(skipped = false) {
                if (timerInterval) clearInterval(timerInterval);
                if (animFrame) cancelAnimationFrame(animFrame);
                timerInterval = null;
                animFrame = null;
                progressBar.style.width = '0%';
                progressBar.classList.remove('warning');
                timeBadge.textContent = '0:00';
                timesUpMsg.textContent = t('timesUp');
                timesUpOverlay.classList.add('show');
                setTimeout(() => {
                    timesUpOverlay.classList.remove('show');
                    distractionScreen.classList.remove('active');
                    distractionContent.innerHTML = '';
                    setupScreen.style.display = 'flex';
                    progressBar.style.width = '100%';
                    shuffledItems = [];
                }, 1800);
            }

            // ─────────────────── VISUALS ───────────────────
            function startVisuals() {
                const canvas = document.getElementById('visuals-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const resize = () => { canvas.width = distractionContent.clientWidth;
                    canvas.height = distractionContent.clientHeight; };
                resize();
                window.addEventListener('resize', resize);
                particles = [];
                for (let i = 0; i < 80; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() *
                        canvas.height, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5, r: Math
                        .random() * 3 + 1, hue: Math.random() * 360 });

                function animate() {
                    if (!document.getElementById('visuals-canvas')) return;
                    resize();
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000a18';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.x += p.vx;
                        p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p
                            .y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                        p.hue = (p.hue + 0.2) % 360; });
                    for (let i = 0; i < particles.length; i++)
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x,
                                dy = particles[i].y - particles[j].y,
                                dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 90) { ctx.strokeStyle =
                                    `hsla(${particles[i].hue},70%,60%,${0.25*(1-dist/90)})`;
                                ctx.lineWidth = 0.6;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke(); }
                        }
                    particles.forEach(p => { ctx.fillStyle = `hsla(${p.hue},80%,65%,0.9)`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fill(); });
                    animFrame = requestAnimationFrame(animate);
                }
                animFrame = requestAnimationFrame(animate);
            }

            // ─────────────────── INIT ───────────────────
            applyTheme();
            renderSetup();
            langToggle.textContent = 'EN';
        })();
    </script>
