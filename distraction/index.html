    // ---------- STATE ----------
    let currentLang = 'en', theme = 'dark';
    let timerDuration = 60, distractionType = 'random';
    let textDistractionDuration = 30;
    let timerInterval = null, animFrame = null;
    let timeRemaining = 0, totalTime = 0;
    let resolvedType = null;
    let videoPool = [], videoTimeout = null;
    let currentCycleData = null;
    let lastSegmentIndex = -1;
    let particles = [];

    const TEXT_TYPES = ['questions','riddles','jokes','movies','popculture'];
    const VIDEO_TYPES = ['shorts','music','hiddencam','fitness'];

    // ---------- TRANSLATIONS ----------
    const i18n = {
      en: {
        title:"⏳ Distraction Timer", selectTime:"Select Wait Time", distractionDuration:"Text Distraction Length",
        selectDistraction:"Choose Distraction", startBtn:"▶ Start Timer",
        questions:"Questions", riddles:"Riddles", jokes:"Jokes", moviesTrivia:"Movies", popCulture:"Pop Culture",
        shorts:"Shorts", music:"Music", hiddenCam:"Hidden Cam", fitness:"Fitness", visuals:"Visuals", random:"Random",
        timesUp:"⏰ Time's Up!", skipTitle:"Skip timer", revealLabel:"Reveals soon...",
        questionPrefix:"Question", sec:"s", min:"m"
      },
      bg: {
        title:"⏳ Таймер за разсейване", selectTime:"Избери време", distractionDuration:"Продължителност на текст",
        selectDistraction:"Избери разсейване", startBtn:"▶ Старт",
        questions:"Въпроси", riddles:"Гатанки", jokes:"Вицове", moviesTrivia:"Филми", popCulture:"Поп култура",
        shorts:"Клипове", music:"Музика", hiddenCam:"Скрита камера", fitness:"Фитнес", visuals:"Визуализации", random:"Случайно",
        timesUp:"⏰ Времето изтече!", skipTitle:"Пропусни", revealLabel:"Отговор скоро...",
        questionPrefix:"Въпрос", sec:"с", min:"м"
      }
    };
    function t(key) { return i18n[currentLang][key] || key; }

    // ---------- DOM ----------
    const setupScreen = document.getElementById('setup-screen');
    const distractionScreen = document.getElementById('distraction-screen');
    const progressBar = document.getElementById('progress-bar');
    const distractionContent = document.getElementById('distraction-content');
    const timeDisplay = document.getElementById('time-remaining-display');
    const timesUpOverlay = document.getElementById('times-up-overlay');
    const startBtn = document.getElementById('start-btn');
    const skipBtn = document.getElementById('skip-button');
    const themeToggle = document.getElementById('theme-toggle');
    const langToggle = document.getElementById('lang-toggle');

    // ---------- THEME & LANG ----------
    function applyTheme() {
      if (theme === 'light') document.body.classList.add('light-mode');
      else document.body.classList.remove('light-mode');
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    themeToggle.addEventListener('click', ()=>{ theme = theme==='dark'?'light':'dark'; applyTheme(); });

    function updateAllUITexts() {
      document.getElementById('main-title').textContent = t('title');
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (el.tagName === 'SPAN' && el.parentElement?.classList.contains('option-btn')) el.textContent = t(key);
        else if (el.id === 'start-btn') el.textContent = t('startBtn');
        else if (el.classList.contains('times-up-text')) el.textContent = t('timesUp');
        else if (el.classList.contains('section-label')) el.textContent = t(key);
      });
      document.querySelectorAll('#time-options .option-btn').forEach(btn => {
        const time = parseInt(btn.dataset.time);
        if(time<60) btn.innerHTML=`🕐 ${time}${t('sec')}`;
        else if(time===60) btn.innerHTML=`🕐 1${t('min')}`;
        else btn.innerHTML=`🕐 ${time/60}${t('min')}`;
      });
      skipBtn.title = t('skipTitle');
    }
    langToggle.addEventListener('click', ()=>{
      currentLang = currentLang==='en'?'bg':'en';
      langToggle.textContent = currentLang==='en'?'EN':'BG';
      updateAllUITexts();
      if(distractionScreen.classList.contains('active') && TEXT_TYPES.includes(resolvedType)) {
        const revealLabel = document.querySelector('.reveal-label');
        if(revealLabel) revealLabel.textContent = t('revealLabel');
        const qPrefix = document.querySelector('.q-prefix');
        if(qPrefix) qPrefix.textContent = t('questionPrefix');
      }
    });

    // ---------- SETUP LISTENERS ----------
    document.getElementById('time-options').addEventListener('click', e=>{
      const btn = e.target.closest('.option-btn'); if(!btn) return;
      document.querySelectorAll('#time-options .option-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected'); timerDuration = parseInt(btn.dataset.time);
    });
    document.getElementById('duration-options').addEventListener('click', e=>{
      const btn = e.target.closest('.option-btn'); if(!btn) return;
      document.querySelectorAll('#duration-options .option-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected'); textDistractionDuration = parseInt(btn.dataset.dur);
    });
    document.getElementById('distraction-options').addEventListener('click', e=>{
      const btn = e.target.closest('.option-btn'); if(!btn) return;
      document.querySelectorAll('#distraction-options .option-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected'); distractionType = btn.dataset.type;
    });
    startBtn.addEventListener('click', startDistraction);
    skipBtn.addEventListener('click', ()=>{ if(timerInterval) endDistraction(true); });

    // ---------- HELPERS ----------
    function getData() { return currentLang==='bg' ? dataBg : dataEn; }
    function pickRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

    function resolveType() {
      if(distractionType!=='random') return distractionType;
      const all = [...TEXT_TYPES, ...VIDEO_TYPES, 'visuals'];
      return all[Math.floor(Math.random()*all.length)];
    }

    function getVideoPoolForType(type) {
      if(type==='shorts') return shortVideos;
      if(type==='music') return musicVideos;
      if(type==='hiddencam') return hiddenCamVideos;
      if(type==='fitness') return fitnessVideos;
      return [];
    }

    function getNewTextItem(type) {
      const data = getData();
      if(type==='questions') return pickRandom(data.questions);
      if(type==='riddles') return pickRandom(data.riddles);
      if(type==='jokes') return pickRandom(data.jokes);
      if(type==='movies') return pickRandom(data.movies);
      if(type==='popculture') return pickRandom(data.popculture);
      return null;
    }

    function renderTextItem(item, type) {
      distractionContent.innerHTML = '';
      if(['questions','movies','popculture'].includes(type)) {
        distractionContent.innerHTML = `
          <div class="millionaire-container">
            <div class="millionaire-question-box"><div class="q-prefix">${t('questionPrefix')}</div><div class="q-text">${item.q}</div></div>
            <div class="millionaire-answers">${item.answers.map((a,i)=>`<div class="millionaire-answer" data-idx="${i}"><span class="ans-letter">${String.fromCharCode(65+i)}</span><span>${a}</span></div>`).join('')}</div>
          </div>`;
      } else if(type==='riddles') {
        distractionContent.innerHTML = `<div class="riddle-joke-container"><p class="main-text">🧩 ${item.riddle}</p><div class="reveal-label">${t('revealLabel')}</div><p class="reveal-text" id="reveal-text">${item.answer}</p></div>`;
      } else if(type==='jokes') {
        distractionContent.innerHTML = `<div class="riddle-joke-container"><p class="main-text">😂 ${item.setup}</p><div class="reveal-label">${t('revealLabel')}</div><p class="reveal-text" id="reveal-text">${item.punchline}</p></div>`;
      }
    }

    function revealCurrentText(type) {
      if(['questions','movies','popculture'].includes(type)) {
        document.querySelectorAll('.millionaire-answer').forEach((el,i)=>{
          if(i===currentCycleData.correct) el.classList.add('correct-reveal');
          else el.style.opacity='0.45';
        });
      } else if(type==='riddles'||type==='jokes') {
        const rev = document.getElementById('reveal-text');
        if(rev && !rev.classList.contains('visible')) rev.classList.add('visible');
      }
    }

    function embedVideo(video) {
      const container = document.getElementById('video-container');
      if(!container) return;
      container.innerHTML = `<iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&enablejsapi=1&cc_load_policy=0&playsinline=1" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation" style="width:100%;height:100%;border:none;pointer-events:none;"></iframe>`;
    }

    function scheduleNextVideo() {
      if(!VIDEO_TYPES.includes(resolvedType) || timeRemaining <= 0) return;
      if(videoTimeout) clearTimeout(videoTimeout);
      const nextVideo = pickRandom(videoPool);
      const delay = Math.min(nextVideo.duration * 1000, timeRemaining * 1000);
      videoTimeout = setTimeout(() => {
        if(timeRemaining <= 0) return;
        embedVideo(nextVideo);
        scheduleNextVideo();
      }, delay);
    }

    // ---------- TIMER & CYCLING ----------
    function startDistraction() {
      resolvedType = resolveType();
      totalTime = timerDuration;
      timeRemaining = totalTime;
      lastSegmentIndex = -1;
      currentCycleData = null;
      if(videoTimeout) { clearTimeout(videoTimeout); videoTimeout = null; }
      videoPool = [];

      if(TEXT_TYPES.includes(resolvedType)) {
        currentCycleData = getNewTextItem(resolvedType);
        renderTextItem(currentCycleData, resolvedType);
      } else if(VIDEO_TYPES.includes(resolvedType)) {
        videoPool = getVideoPoolForType(resolvedType);
        distractionContent.innerHTML = `<div class="video-wrapper" id="video-container">Loading...</div>`;
        embedVideo(pickRandom(videoPool));
        scheduleNextVideo();
      } else if(resolvedType==='visuals') {
        distractionContent.innerHTML = `<canvas id="visuals-canvas"></canvas>`;
        const canvas = document.getElementById('visuals-canvas');
        if(canvas) { canvas.width = distractionContent.clientWidth; canvas.height = distractionContent.clientHeight; }
        startVisuals();
      }

      setupScreen.style.display = 'none';
      distractionScreen.classList.add('active');
      progressBar.style.width = '100%';
      progressBar.classList.remove('warning');
      timeDisplay.textContent = formatTime(timeRemaining);
      timesUpOverlay.classList.remove('show');

      const startTime = performance.now();
      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        const elapsed = (performance.now() - startTime)/1000;
        timeRemaining = Math.max(0, totalTime - elapsed);
        progressBar.style.width = (timeRemaining/totalTime*100)+'%';
        if(timeRemaining <= 5) progressBar.classList.add('warning');
        else progressBar.classList.remove('warning');
        timeDisplay.textContent = formatTime(timeRemaining);

        if(TEXT_TYPES.includes(resolvedType)) {
          const elapsedSec = totalTime - timeRemaining;
          const segmentIndex = Math.floor(elapsedSec / textDistractionDuration);
          if(segmentIndex !== lastSegmentIndex) {
            lastSegmentIndex = segmentIndex;
            currentCycleData = getNewTextItem(resolvedType);
            renderTextItem(currentCycleData, resolvedType);
          }
          const segStart = segmentIndex * textDistractionDuration;
          const segRemaining = (segStart + textDistractionDuration) - elapsedSec;
          if(segRemaining <= 5 && segRemaining > 0) revealCurrentText(resolvedType);
        }

        if(timeRemaining <= 0) endDistraction(false);
      }, 80);
    }

    function endDistraction(skipped=false) {
      if(timerInterval) clearInterval(timerInterval);
      if(videoTimeout) clearTimeout(videoTimeout);
      if(animFrame) cancelAnimationFrame(animFrame);
      timerInterval=null; videoTimeout=null; animFrame=null;
      progressBar.style.width='0%'; progressBar.classList.remove('warning');
      timeDisplay.textContent='0:00';
      timesUpOverlay.querySelector('.times-up-text').textContent = t('timesUp');
      timesUpOverlay.classList.add('show');
      setTimeout(()=>{
        timesUpOverlay.classList.remove('show');
        distractionScreen.classList.remove('active');
        distractionContent.innerHTML='';
        setupScreen.style.display='flex';
        progressBar.style.width='100%';
        currentCycleData=null;
      },1800);
    }

    function formatTime(sec) {
      const s = Math.ceil(Math.max(0,sec));
      return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
    }

    // ---------- VISUALS ----------
    function startVisuals() {
      const canvas = document.getElementById('visuals-canvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      const resize=()=>{ canvas.width = distractionContent.clientWidth; canvas.height = distractionContent.clientHeight; };
      resize(); window.addEventListener('resize', resize);
      particles = [];
      for(let i=0;i<80;i++) particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,r:Math.random()*3+1,hue:Math.random()*360});
      function animate(){
        if(!document.getElementById('visuals-canvas')) return;
        resize(); ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='#000a18'; ctx.fillRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; p.hue=(p.hue+0.2)%360; });
        for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
          const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<90){ ctx.strokeStyle=`hsla(${particles[i].hue},70%,60%,${0.25*(1-dist/90)})`; ctx.lineWidth=0.6; ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); }
        }
        particles.forEach(p=>{ ctx.fillStyle=`hsla(${p.hue},80%,65%,0.9)`; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
        animFrame=requestAnimationFrame(animate);
      }
      animFrame=requestAnimationFrame(animate);
    }

    // ---------- INIT ----------
    applyTheme();
    updateAllUITexts();
    langToggle.textContent = 'EN';
  })();
