<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        :root {
            --bg: #0a0a14;
            --surface: rgba(255, 255, 255, 0.05);
            --surface2: rgba(255, 255, 255, 0.09);
            --text: #f0f0f5;
            --text2: #a0a0b8;
            --accent: #c9a84c;
            --accent2: #e0c874;
            --border: rgba(255, 255, 255, 0.09);
            --border2: rgba(255, 255, 255, 0.15);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            --glass: rgba(255, 255, 255, 0.04);
            --glass2: rgba(255, 255, 255, 0.07);
            --progress-bg: rgba(255, 255, 255, 0.06);
            --progress-fill: #4a90d9;
            --card-radius: 22px;
            --btn-radius: 26px;
            --transition: 0.28s cubic-bezier(0.25, 0.1, 0.25, 1);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
        }
        body.light-mode {
            --bg: #f0f2f5;
            --surface: rgba(0, 0, 0, 0.03);
            --surface2: rgba(0, 0, 0, 0.06);
            --text: #1a1a2e;
            --text2: #5a5a7a;
            --accent: #b88630;
            --accent2: #8b5e2b;
            --border: rgba(0, 0, 0, 0.08);
            --border2: rgba(0, 0, 0, 0.13);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
            --glass: rgba(255, 255, 255, 0.5);
            --glass2: rgba(255, 255, 255, 0.7);
            --progress-bg: rgba(0, 0, 0, 0.05);
            --progress-fill: #2d6fb0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            transition: background 0.4s, color 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        #app { width: 100%; height: 100%; max-width: 620px; display: flex; flex-direction: column; position: relative; }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow);
        }
        #setup-screen { flex: 1; display: flex; flex-direction: column; padding: 16px 16px 20px; gap: 8px; overflow-y: auto; }
        .setup-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; flex-shrink: 0; }
        .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
        .brand span { color: var(--accent); }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: all var(--transition); flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--surface2); border-color: var(--border2); transform: scale(1.04); }
        .icon-btn svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .lang-btn { font-weight: 700; font-size: 0.82rem; letter-spacing: 0.04em; width: 42px; }
        .setup-card { padding: 22px 20px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .setup-section { display: flex; flex-direction: column; gap: 10px; }
        .setup-section .section-question { font-size: clamp(0.9rem, 2.5vw, 1.1rem); font-weight: 600; color: var(--text); }
        .setup-section .section-hint { font-size: 0.7rem; color: var(--text2); }
        .option-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .option-btn {
            padding: 10px 16px; border-radius: var(--btn-radius); border: 1px solid var(--border);
            background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.88rem;
            font-weight: 500; transition: all var(--transition); font-family: var(--font);
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .option-btn:hover { background: var(--surface2); border-color: var(--border2); transform: translateY(-1px); }
        .option-btn.selected { background: rgba(200,160,60,0.12); border-color: var(--accent); color: var(--accent); font-weight: 600; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .category-btn {
            padding: 12px 8px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface);
            color: var(--text); cursor: pointer; font-size: 0.8rem; font-weight: 500;
            transition: all var(--transition); font-family: var(--font); display: flex;
            align-items: center; gap: 6px; justify-content: center;
        }
        .category-btn:hover { background: var(--surface2); border-color: var(--border2); transform: translateY(-2px); }
        .category-btn.selected { background: rgba(200,160,60,0.12); border-color: var(--accent); color: var(--accent); font-weight: 600; }
        .category-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        #start-btn {
            padding: 15px 32px; border-radius: 30px; border: none; background: linear-gradient(135deg, #c9a84c, #a07828);
            color: #fff; cursor: pointer; font-size: 1rem; font-weight: 600; letter-spacing: 0.04em;
            font-family: var(--font); width: 100%; transition: all var(--transition); box-shadow: 0 6px 24px rgba(180,130,40,0.3);
        }
        #start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(200,150,50,0.4); }

        #distraction-screen { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; z-index: 50; }
        #distraction-screen.active { display: flex; }
        #progress-bar-wrap { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); z-index: 100; }
        #progress-bar { height: 100%; width: 100%; background: var(--progress-fill); transition: width 0.12s linear; }
        #progress-bar.warning { background: #e8a040; animation: pulse 0.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        #distraction-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #time-badge { position: absolute; top: 14px; right: 56px; z-index: 102; font-size: 0.75rem; color: #bbb; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); padding: 5px 11px; border-radius: 16px; pointer-events: none; border: 1px solid rgba(255,255,255,0.15); }
        #skip-btn { position: absolute; top: 12px; right: 14px; z-index: 105; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #skip-btn:hover { background: rgba(220,80,70,0.7); border-color: #e05555; }
        #next-btn { position: absolute; top: 12px; left: 14px; z-index: 105; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #next-btn:hover { background: rgba(255,255,255,0.2); }
        #fade-overlay { position: fixed; inset: 0; background: black; z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.3s linear; display: flex; align-items: center; justify-content: center; }
        #fade-overlay .fade-text { font-size: clamp(2rem, 8vw, 4rem); font-weight: 700; color: #fff; opacity: 0; transition: opacity 0.5s ease; }
        #fade-overlay .fade-text.show { opacity: 1; }
        .text-content-wrap { text-align: center; padding: 30px 24px; max-width: 650px; width: 100%; }
        .text-content-wrap .main-text { font-size: clamp(1rem, 2.8vw, 1.55rem); font-weight: 500; color: #eee; line-height: 1.5; }
        .reveal-text { margin-top: 20px; font-size: clamp(0.9rem, 2.2vw, 1.3rem); font-weight: 700; color: #e0c874; opacity: 0; transform: translateY(10px); transition: all 0.45s ease; }
        .reveal-text.visible { opacity: 1; transform: translateY(0); }
        .reveal-hint { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 6px; }
        .millionaire-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 750px; padding: 16px; gap: 16px; }
        .millionaire-qbox { background: rgba(10,14,28,0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; padding: 18px 22px; text-align: center; width: 100%; }
        .millionaire-qbox .q-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: #889; margin-bottom: 6px; }
        .millionaire-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .millionaire-ans { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 12px; background: rgba(18,26,50,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: #ccc; font-weight: 500; font-size: 0.9rem; transition: all 0.35s; }
        .millionaire-ans .ans-circle { width: 28px; height: 28px; border-radius: 50%; background: #1a3050; border: 2px solid #345880; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; flex-shrink: 0; transition: all 0.35s; }
        .millionaire-ans.correct-glow { border-color: #c9a84c !important; background: rgba(180,140,40,0.18) !important; }
        .millionaire-ans.correct-glow .ans-circle { background: #c9a84c !important; border-color: #e0c874 !important; color: #1a0e00 !important; }
        .video-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .video-wrap iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        #visuals-canvas { width: 100%; height: 100%; display: block; }
        @media (min-width: 1400px) { .setup-card { padding: 32px 30px; gap: 24px; } .section-question { font-size: 1.3rem !important; } .option-btn { font-size: 1rem; padding: 14px 24px; } .category-btn { font-size: 0.95rem; padding: 16px 12px; } }
    </style>
</head>
<body>
<div id="app">
    <div id="setup-screen">
        <div class="setup-top-bar">
            <div class="brand">Distraction<span>Timer</span></div>
            <div style="display:flex;gap:6px;">
                <button class="icon-btn" id="theme-toggle"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
                <button class="icon-btn lang-btn" id="lang-toggle">EN</button>

            <div class="setup-section"><div class="section-question" id="q-time">How long should the timer run?</div><div class="section-hint" id="h-time">Pick your total wait duration</div><div class="option-row" id="time-options"></div></div>
            <div class="setup-section"><div class="section-question" id="q-refresh">How often should content refresh?</div><div class="section-hint" id="h-refresh">For text‑based distractions only</div><div class="option-row" id="duration-options"></div></div>
            <div class="setup-section"><div class="section-question" id="q-cat">What would you like to do?</div><div class="section-hint" id="h-cat">Choose your distraction category</div><div class="category-grid" id="category-options"></div></div>

    <div id="distraction-screen">
        <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

        <button id="next-btn" title="Next">⏭</button>

        <div id="distraction-content"></div>

</div>

    const i18n={en:{qTime:"How long should the timer run?",hTime:"Pick your total wait duration",qRefresh:"How often should content refresh?",hRefresh:"For text‑based distractions only",qCat:"What would you like to do?",hCat:"Choose your distraction category",start:"Start Timer",timesUp:"Time's Up",sec:"s",min:"m",questions:"Questions",riddles:"Riddles",jokes:"Jokes",moviesTrivia:"Movies",popCulture:"Pop Culture",shorts:"Shorts",music:"Music",hiddenCam:"Hidden Cam",fitness:"Fitness",visuals:"Visuals",random:"Random",revealHint:"Reveals soon...",qLabel:"Question"},bg:{qTime:"Колко време да тече таймерът?",hTime:"Избери обща продължителност",qRefresh:"На колко често да се сменя?",hRefresh:"Само за текстови категории",qCat:"Какво искаш да правиш?",hCat:"Избери категория",start:"Старт",timesUp:"Времето изтече",sec:"с",min:"м",questions:"Въпроси",riddles:"Гатанки",jokes:"Вицове",moviesTrivia:"Филми",popCulture:"Поп култура",shorts:"Shorts",music:"Музика",hiddenCam:"Скрита камера",fitness:"Фитнес",visuals:"Визуализации",random:"Случайно",revealHint:"Отговор скоро...",qLabel:"Въпрос"}};

        const icons={speech:'<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',puzzle:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>',smile:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>',film:'<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',star:'<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>',play:'<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg>',note:'<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',eye:'<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>',dumbbell:'<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/><rect x="2" y="8" width="4" height="8" rx="1.5"/><rect x="18" y="8" width="4" height="8" rx="1.5"/></svg>',shapes:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>',shuffle:'<svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>'};
        document.getElementById('category-options').innerHTML=cats.map(c=>`<button class="category-btn${distractionType===c.type?' selected':''}" data-type="${c.type}">${icons[c.icon]} ${t(c.type)}</button>`).join('');
        document.querySelectorAll('#time-options .option-btn').forEach(b=>b.onclick=()=>{timerDuration=+b.dataset.time;renderSetup()});
        document.querySelectorAll('#duration-options .option-btn').forEach(b=>b.onclick=()=>{textDistractionDuration=+b.dataset.dur;renderSetup()});
        document.querySelectorAll('#category-options .category-btn').forEach(b=>b.onclick=()=>{distractionType=b.dataset.type;renderSetup()});
    }

    langToggle.onclick=()=>{currentLang=currentLang==='en'?'bg':'en';langToggle.textContent=currentLang==='en'?'EN':'BG';renderSetup()};

    function getData(){return currentLang==='bg'?dataBg:dataEn}
    function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
    function resolveType(){if(distractionType!=='random')return distractionType;const all=[...TEXT_TYPES,...VIDEO_TYPES,'visuals'];return all[Math.floor(Math.random()*all.length)]}
    function getVideoPool(t){return t==='shorts'?shortVideos:t==='music'?musicVideos:t==='hiddencam'?hiddenCamVideos:t==='fitness'?fitnessVideos:[]}
    function formatTime(s){const sec=Math.ceil(Math.max(0,s));return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`}

    function playBeep(){if(beeped)return;beeped=true;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type='sine';osc.frequency.value=880;gain.gain.value=0.3;osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.15)}catch(e){}}

    let currentTypingElement=null,typingSpeed=40,typingComplete=true;

    function typeText(element,text,callback){
        if(currentTypingElement) clearInterval(currentTypingElement.interval);
        element.textContent='';let i=0;typingComplete=false;
        const interval=setInterval(()=>{
            element.textContent+=text.charAt(i);i++;
            if(i>=text.length){clearInterval(interval);typingComplete=true;if(callback)callback()}
        },typingSpeed);
        currentTypingElement={element,interval};
    }

    function renderTextItem(item,type){
        distractionContent.innerHTML='';
        if(['questions','movies','popculture'].includes(type)){
            distractionContent.innerHTML=`<div class="millionaire-wrap"><div class="millionaire-qbox"><div class="q-label">${t('qLabel')}</div><div class="typing-area" style="font-size:1.2rem;color:#eee;"></div></div><div class="millionaire-answers">${item.answers.map((a,i)=>`<div class="millionaire-ans" data-idx="${i}"><span class="ans-circle">${String.fromCharCode(65+i)}</span><span>${a}</span></div>`).join('')}</div></div>`;
            const typingEl=distractionContent.querySelector('.typing-area');
            const text=item.q;const availableTime=(textDistractionDuration-5)*1000;
            typingSpeed=Math.min(40, availableTime/(text.length+1));
            typeText(typingEl,text);
        }else if(type==='riddles'){
            distractionContent.innerHTML=`<div class="text-content-wrap"><p class="main-text typing-area"></p><div class="reveal-hint">${t('revealHint')}</div><p class="reveal-text" id="reveal-text">${item.answer}</p></div>`;
            const typingEl=distractionContent.querySelector('.typing-area');
            const text=item.riddle;const availableTime=(textDistractionDuration-5)*1000;
            typingSpeed=Math.min(40, availableTime/(text.length+1));
            typeText(typingEl,text);
        }else if(type==='jokes'){
            distractionContent.innerHTML=`<div class="text-content-wrap"><p class="main-text typing-area"></p><div class="reveal-hint">${t('revealHint')}</div><p class="reveal-text" id="reveal-text">${item.punchline}</p></div>`;
            const typingEl=distractionContent.querySelector('.typing-area');
            const text=item.setup;const availableTime=(textDistractionDuration-5)*1000;
            typingSpeed=Math.min(40, availableTime/(text.length+1));
            typeText(typingEl,text);
        }
    }

    function revealCurrentText(type){
        if(!typingComplete) return;
        if(['questions','movies','popculture'].includes(type)){
            const item=shuffledItems[currentShuffleIndex];
            document.querySelectorAll('.millionaire-ans').forEach((el,i)=>{if(i===item.correct)el.classList.add('correct-glow');else el.style.opacity='0.4'});
        }else if(type==='riddles'||type==='jokes'){
            const rev=document.getElementById('reveal-text');
            if(rev) rev.classList.add('visible');
        }
    }

    function nextDistraction(){
        if(TEXT_TYPES.includes(resolvedType)){
            currentShuffleIndex++;if(currentShuffleIndex>=shuffledItems.length){shuffledItems=shuffle(shuffledItems);currentShuffleIndex=0}
            renderTextItem(shuffledItems[currentShuffleIndex],resolvedType);
            typingComplete=false;
        }else if(VIDEO_TYPES.includes(resolvedType)){
            currentShuffleIndex++;if(currentShuffleIndex>=shuffledItems.length){shuffledItems=shuffle(shuffledItems);currentShuffleIndex=0}
            const nextVideo=shuffledItems[currentShuffleIndex];
            distractionContent.innerHTML=`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${nextVideo.id}?autoplay=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&enablejsapi=1&cc_load_policy=0&playsinline=1" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation" style="width:100%;height:100%;border:none;pointer-events:none;"></iframe></div>`;
        }else if(resolvedType==='visuals'){/* restart breathing ring by resetting phase */ breathPhase=0;}
    }

    nextBtn.onclick=nextDistraction;

    function startDistraction(){
        resolvedType=resolveType();totalTime=timerDuration;timeRemaining=totalTime;
        shuffledItems=[];currentShuffleIndex=0;typingComplete=false;beeped=false;
        if(animFrame)cancelAnimationFrame(animFrame);
        if(currentTypingElement){clearInterval(currentTypingElement.interval);currentTypingElement=null}
        if(TEXT_TYPES.includes(resolvedType)){
            const raw=getData()[resolvedType]||[];shuffledItems=shuffle(raw);
            renderTextItem(shuffledItems[0],resolvedType);
        }else if(VIDEO_TYPES.includes(resolvedType)){
            const pool=getVideoPool(resolvedType);shuffledItems=shuffle(pool);
            distractionContent.innerHTML=`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${shuffledItems[0].id}?autoplay=1&controls=0&rel=0&modestbranding=1&iv_load_policy=3&fs=0&enablejsapi=1&cc_load_policy=0&playsinline=1" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-presentation" style="width:100%;height:100%;border:none;pointer-events:none;"></iframe></div>`;
        }else if(resolvedType==='visuals'){
            distractionContent.innerHTML='<canvas id="visuals-canvas"></canvas>';
            const canvas=document.getElementById('visuals-canvas');
            if(canvas){canvas.width=distractionContent.clientWidth;canvas.height=distractionContent.clientHeight;}
            startBreathingRing();
        }
        setupScreen.style.display='none';distractionScreen.classList.add('active');
        progressBar.style.width='100%';progressBar.classList.remove('warning');
        timeBadge.textContent=formatTime(timeRemaining);fadeOverlay.style.opacity='0';fadeText.classList.remove('show');
        const startTime=performance.now();
        if(timerInterval)clearInterval(timerInterval);
        timerInterval=setInterval(()=>{
            const elapsed=(performance.now()-startTime)/1000;
            timeRemaining=Math.max(0,totalTime-elapsed);
            progressBar.style.width=(timeRemaining/totalTime*100)+'%';
            if(timeRemaining<=5)progressBar.classList.add('warning');else progressBar.classList.remove('warning');
            timeBadge.textContent=formatTime(timeRemaining);
            if(timeRemaining<=3&&!beeped) playBeep();
            if(timeRemaining<=5){
                const fadeOpacity=Math.min(1,(5-timeRemaining)/3);
                fadeOverlay.style.opacity=fadeOpacity;
                if(timeRemaining<=2){fadeText.classList.add('show');fadeText.textContent=t('timesUp')}
            }else{fadeOverlay.style.opacity='0';fadeText.classList.remove('show')}
            if(TEXT_TYPES.includes(resolvedType)&&shuffledItems.length>0){
                const elapsedSec=totalTime-timeRemaining;
                const segIdx=Math.floor(elapsedSec/textDistractionDuration);
                if(segIdx!==currentShuffleIndex){
                    currentShuffleIndex=segIdx;
                    if(currentShuffleIndex>=shuffledItems.length){shuffledItems=shuffle(shuffledItems);currentShuffleIndex=0}
                    renderTextItem(shuffledItems[currentShuffleIndex],resolvedType);
                }
                const segStart=currentShuffleIndex*textDistractionDuration;
                const segRemaining=(segStart+textDistractionDuration)-elapsedSec;
                if(segRemaining<=5&&segRemaining>0) revealCurrentText(resolvedType);
            }
            if(timeRemaining<=0) endDistraction();
        },80);
    }

    function endDistraction(){
        if(timerInterval)clearInterval(timerInterval);if(animFrame)cancelAnimationFrame(animFrame);
        timerInterval=null;animFrame=null;
        progressBar.style.width='0%';progressBar.classList.remove('warning');
        timeBadge.textContent='0:00';
        setTimeout(()=>{
            fadeOverlay.style.opacity='1';fadeText.classList.add('show');fadeText.textContent=t('timesUp');
            setTimeout(()=>{
                distractionScreen.classList.remove('active');setupScreen.style.display='flex';
                fadeOverlay.style.opacity='0';fadeText.classList.remove('show');
                progressBar.style.width='100%';distractionContent.innerHTML='';
            },2000);
        },500);
    }

    function startBreathingRing(){
        const canvas=document.getElementById('visuals-canvas');if(!canvas)return;
        const ctx=canvas.getContext('2d');let animationId;
        function resize(){canvas.width=distractionContent.clientWidth;canvas.height=distractionContent.clientHeight}
        resize();window.addEventListener('resize',resize);
        function animate(ts){
            const cx=canvas.width/2,cy=canvas.height/2,maxRadius=Math.min(canvas.width,canvas.height)*0.4;
            const cycleDuration=8000;
            const t=(ts%cycleDuration)/cycleDuration;
            const breath=Math.sin(t*Math.PI*2);
            const radius=maxRadius*(0.3+0.5*(breath+1)/2);
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const grad=ctx.createRadialGradient(cx,cy,radius*0.2,cx,cy,radius);
            grad.addColorStop(0,'rgba(200,180,100,0.9)');grad.addColorStop(1,'rgba(100,80,40,0)');
            ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fill();
            ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.stroke();
            animFrame=requestAnimationFrame(animate);
        }
        animFrame=requestAnimationFrame(animate);
    }

    startBtn.onclick=startDistraction;
    skipBtn.onclick=()=>{if(timerInterval)endDistraction()};
    applyTheme();renderSetup();langToggle.textContent='EN';
})();
</script>
</body>
