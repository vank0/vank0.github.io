<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Distraction Timer</title>
<style>
  :root{
    --bg:#0b0d12; --bg2:#12151c;
    --card:rgba(255,255,255,0.06); --card-border:rgba(255,255,255,0.12);
    --text:#f2f3f5; --text-dim:#9aa0ac;
    --accent:#6c8cff; --accent2:#8f6cff;
    --gold:#ffcf5c; --danger:#ff6c6c; --good:#5cffa3;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
    --radius:26px;
    color-scheme:dark;
  }
  html.light{
    --bg:#eef0f5; --bg2:#e3e6ee;
    --card:rgba(255,255,255,0.55); --card-border:rgba(255,255,255,0.7);
    --text:#1b1d24; --text-dim:#666c7a;
    --shadow:0 20px 60px rgba(30,40,80,0.15);
    color-scheme:light;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 20% 15%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 55%),
      radial-gradient(circle at 85% 80%, color-mix(in srgb, var(--accent2) 16%, transparent), transparent 55%),
      var(--bg);
    transition:background .28s cubic-bezier(.4,0,.2,1), color .28s cubic-bezier(.4,0,.2,1);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  .glass{
    background:var(--card);
    border:1px solid var(--card-border);
    backdrop-filter:blur(22px) saturate(160%);
    -webkit-backdrop-filter:blur(22px) saturate(160%);
    box-shadow:var(--shadow);
    border-radius:var(--radius);
  }
  /* ---------- setup screen ---------- */
  #setup{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:clamp(12px,4vw,40px);
  }
  .card{
    width:100%; max-width:720px;
    padding:clamp(20px,4vw,40px);
    display:flex; flex-direction:column; gap:clamp(18px,3vw,28px);
  }
  .topbar{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .topbar h1{
    font-size:clamp(20px,3vw,28px); margin:0; font-weight:700;
    display:flex; align-items:center; gap:10px;
  }
  .topbar .controls{display:flex; gap:8px;}
  .iconbtn{
    width:42px; height:42px; border-radius:14px; border:1px solid var(--card-border);
    background:var(--card); color:var(--text); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:transform .28s cubic-bezier(.4,0,.2,1), background .28s;
  }
  .iconbtn:hover{transform:translateY(-2px); background:color-mix(in srgb, var(--accent) 18%, var(--card));}
  .iconbtn svg{width:20px; height:20px;}
  .langbtn{width:auto; padding:0 14px; font-weight:700; font-size:13px; letter-spacing:.5px;}
  section.q{display:flex; flex-direction:column; gap:12px;}
  section.q h2{
    font-size:clamp(15px,2vw,18px); margin:0; font-weight:600; color:var(--text-dim);
  }
  .chip-row{display:flex; flex-wrap:wrap; gap:10px;}
  .chip{
    padding:10px 18px; border-radius:16px; border:1px solid var(--card-border);
    background:var(--card); color:var(--text); cursor:pointer; font-size:14px; font-weight:600;
    transition:all .28s cubic-bezier(.4,0,.2,1);
  }
  .chip:hover{transform:translateY(-2px);}
  .chip.active{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    border-color:transparent; color:#fff; box-shadow:0 8px 22px color-mix(in srgb, var(--accent) 45%, transparent);
  }
  .cat-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:12px;
  }
  .cat-btn{
    display:flex; flex-direction:column; align-items:center; gap:8px;
    padding:16px 8px; border-radius:20px; border:1px solid var(--card-border);
    background:var(--card); color:var(--text); cursor:pointer;
    transition:all .28s cubic-bezier(.4,0,.2,1);
  }
  .cat-btn:hover{transform:translateY(-3px);}
  .cat-btn.active{
    background:linear-gradient(135deg, color-mix(in srgb,var(--accent) 30%, var(--card)), color-mix(in srgb,var(--accent2) 30%, var(--card)));
    border-color:var(--accent); box-shadow:0 10px 26px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .cat-btn svg{width:26px; height:26px;}
  .cat-btn span{font-size:12.5px; font-weight:600; text-align:center;}
  .start-btn{
    margin-top:6px; padding:16px; border-radius:20px; border:none; cursor:pointer;
    font-size:17px; font-weight:700; color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow:0 14px 34px color-mix(in srgb, var(--accent) 45%, transparent);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
  }
  .start-btn:hover{transform:translateY(-2px) scale(1.01);}

  /* ---------- distraction screen ---------- */
  #distraction{
    position:fixed; inset:0; background:#000; display:none; overflow:hidden; z-index:10;
  }
  #distraction.show{display:block;}
  .progress-track{position:absolute; top:0; left:0; right:0; height:4px; background:rgba(255,255,255,0.08); z-index:5;}
  .progress-fill{height:100%; width:100%; background:var(--accent); transition:width .1s linear, background .3s;}
  .progress-fill.warn{background:#ff9d3d; animation:pulse 0.6s infinite alternate;}
  @keyframes pulse{from{opacity:1;} to{opacity:.45;}}
  .hud-btn{
    position:absolute; top:16px; z-index:6; padding:9px 16px; border-radius:999px; border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.08); backdrop-filter:blur(14px); color:#fff; cursor:pointer;
    display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600;
    transition:transform .28s cubic-bezier(.4,0,.2,1), background .28s;
  }
  .hud-btn:hover{transform:translateY(-2px); background:rgba(255,255,255,0.16);}
  .hud-btn svg{width:15px; height:15px;}
  #nextBtn{left:16px;}
  #skipBtn{right:16px;}
  #timeBadge{
    position:absolute; top:16px; right:120px; z-index:6; padding:9px 16px; border-radius:999px;
    border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.08); backdrop-filter:blur(14px);
    color:#fff; font-variant-numeric:tabular-nums; font-weight:700; font-size:13px;
  }
  .stage{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:40px;}
  .fade-overlay{
    position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; z-index:4;
    transition:opacity .1s linear;
  }
  .times-up{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:7;
    color:#fff; font-size:clamp(28px,6vw,64px); font-weight:800; opacity:0; letter-spacing:1px;
    transition:opacity .5s ease; pointer-events:none;
  }
  .times-up.show{opacity:1;}

  /* trivia layout */
  .trivia-box{max-width:820px; width:100%; text-align:center; color:#fff;}
  .trivia-q{
    font-size:clamp(20px,3.4vw,34px); font-weight:700; margin-bottom:clamp(24px,4vw,40px); min-height:2.4em;
    line-height:1.35;
  }
  .trivia-choices{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:560px){ .trivia-choices{grid-template-columns:1fr;} }
  .choice{
    padding:16px 20px; border-radius:18px; border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.06); color:#fff; font-size:clamp(14px,1.6vw,17px); font-weight:600;
    transition:all .4s cubic-bezier(.4,0,.2,1); opacity:1;
  }
  .choice.correct{background:rgba(255,207,92,0.18); border-color:var(--gold); box-shadow:0 0 30px rgba(255,207,92,0.5); color:var(--gold);}
  .choice.dim{opacity:.35;}

  /* riddle/joke layout */
  .text-box{max-width:780px; width:100%; text-align:center; color:#fff;}
  .text-main{font-size:clamp(20px,3.6vw,36px); font-weight:700; line-height:1.4; min-height:2.4em;}
  .text-answer{
    margin-top:28px; font-size:clamp(16px,2.4vw,24px); color:var(--gold); font-weight:600;
    opacity:0; transition:opacity .8s ease;
  }
  .text-answer.show{opacity:1;}
  .cursor{opacity:.7; animation:blink 1s step-start infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* video */
  .video-wrap{position:absolute; inset:0;}
  .video-wrap iframe{width:100%; height:100%; border:0;}

  /* visuals canvas */
  #visualCanvas{position:absolute; inset:0; width:100%; height:100%;}

  @media (max-width:480px){
    #timeBadge{right:70px; padding:7px 12px; font-size:12px;}
    .hud-btn{padding:7px 12px; font-size:12px;}
  }
</style>
</head>

/* ============ config ============ */

};
const SUN = '<circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.6 4.6l2.1 2.1M17.3 17.3l2.1 2.1M4.6 19.4l2.1-2.1M17.3 6.7l2.1-2.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';
const MOON = '<path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z" fill="currentColor"/>';
const NEXT_ICON = '<path d="M6 5l7 7-7 7M15 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';

function svg(paths){ return `<svg viewBox="0 0 24 24">${paths}</svg>`; }

/* ============ state ============ */
const state = {
  lang: localStorage.getItem('dt.lang') || 'en',
  theme: localStorage.getItem('dt.theme') || 'dark',
  duration: DURATIONS[1],
  refresh: REFRESH[1],
  category: 'questions',
  audioCtx: null
};

function t(key){ return I18N[state.lang][key] || key; }

function applyTheme(){
  document.documentElement.classList.toggle('light', state.theme==='light');
}
applyTheme();

/* ============ setup screen render ============ */
function renderSetup(){
  const el = document.getElementById('setup');

    <div class="card glass">
      <div class="topbar">

      </div>
      <section class="q">

      <section class="q">

    state.theme = state.theme==='dark'?'light':'dark';
    localStorage.setItem('dt.theme', state.theme);

  };
  el.querySelectorAll('[data-dur]').forEach(b=>b.onclick=()=>{ state.duration=+b.dataset.dur; renderSetup(); });
  el.querySelectorAll('[data-ref]').forEach(b=>b.onclick=()=>{ state.refresh=+b.dataset.ref; renderSetup(); });
  el.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{ state.category=b.dataset.cat; renderSetup(); });

}

/* ============ audio beep ============ */
function ensureAudio(){
  if(!state.audioCtx) state.audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return state.audioCtx;
}
function beep(){
  try{
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type='sine'; osc.frequency.value=880;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.35);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}

/* ============ distraction runtime ============ */
const run = {
  active:false, totalMs:0, startTime:0, beeped:false, rafId:0, endTimeout:0,
  category:'', pool:[], poolIdx:0,
  itemStart:0, itemMs:0, typeTimer:0, typed:false,
  videoList:[], videoIdx:0,
  visualStart:0
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function startTimer(){
  ensureAudio();
  let cat = state.category;
  if(cat==='random'){
    const all = CATEGORIES.filter(c=>c!=='random');
    cat = all[Math.floor(Math.random()*all.length)];
  }
  run.active = true;
  run.category = cat;
  run.totalMs = state.duration;
  run.startTime = performance.now();
  run.beeped = false;

  if(TEXT_CATS.includes(cat)){
    run.pool = shuffle(CONTENT[state.lang][cat]);
    run.poolIdx = 0;
    startItem();
  } else if(VIDEO_CATS.includes(cat)){
    run.videoList = shuffle(VIDEOS[cat]);
    run.videoIdx = 0;
    renderVideo();
  } else if(cat==='visuals'){
    run.visualStart = performance.now();
    renderVisual();
  }

  document.getElementById('distraction').classList.add('show');
  document.getElementById('nextBtn').innerHTML = `${svg(NEXT_ICON)} ${t('next')}`;
  document.getElementById('skipBtn').innerHTML = `${svg(SKIP_ICON)} ${t('skip')}`;
  document.getElementById('nextBtn').onclick = onNext;
  document.getElementById('skipBtn').onclick = ()=>endSession(true);
  document.getElementById('timesUp').textContent = t('timesUp');
  document.getElementById('timesUp').classList.remove('show');
  document.getElementById('fadeOverlay').style.opacity = 0;

  cancelAnimationFrame(run.rafId);
  loop();
}

function loop(){
  if(!run.active) return;
  const now = performance.now();
  const remaining = Math.max(0, run.totalMs - (now-run.startTime));

  const fill = document.getElementById('progressFill');
  fill.style.width = (remaining/run.totalMs*100)+'%';
  fill.classList.toggle('warn', remaining<=5000);
  document.getElementById('timeBadge').textContent = fmtTime(remaining);
  document.getElementById('fadeOverlay').style.opacity = remaining<=5000 ? (1 - remaining/5000) : 0;
  document.getElementById('timesUp').classList.toggle('show', remaining<=2000 && remaining>0 || remaining<=0);

  if(!run.beeped && remaining<=3000 && remaining>0){ run.beeped = true; beep(); }

  if(TEXT_CATS.includes(run.category)){
    const itemRemaining = Math.max(0, run.itemMs - (now-run.itemStart));
    updateItemReveal(itemRemaining);
    if(itemRemaining<=0) startItem();
  }

  if(remaining<=0){ endSession(false); return; }
  run.rafId = requestAnimationFrame(loop);
}

function fmtTime(ms){
  const s = Math.ceil(ms/1000);
  const m = Math.floor(s/60);
  const sec = s%60;
  return m>0 ? `${m}:${sec.toString().padStart(2,'0')}` : `0:${sec.toString().padStart(2,'0')}`;
}

function endSession(skipped){
  run.active = false;
  cancelAnimationFrame(run.rafId);
  clearInterval(run.typeTimer);
  document.getElementById('timesUp').classList.add('show');
  clearTimeout(run.endTimeout);
  run.endTimeout = setTimeout(()=>{
    document.getElementById('distraction').classList.remove('show');
    document.getElementById('stage').innerHTML = '';
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('progressFill').classList.remove('warn');
    document.getElementById('fadeOverlay').style.opacity = 0;
    document.getElementById('timesUp').classList.remove('show');
  }, 2000);
}

function onNext(){
  if(!run.active) return;
  if(TEXT_CATS.includes(run.category)){
    startItem();
  } else if(VIDEO_CATS.includes(run.category)){
    run.videoIdx = (run.videoIdx+1) % run.videoList.length;
    renderVideo();
  } else if(run.category==='visuals'){
    run.visualStart = performance.now();
  }
}

/* ---- text categories ---- */
function startItem(){
  clearInterval(run.typeTimer);
  if(run.poolIdx >= run.pool.length){ run.pool = shuffle(run.pool); run.poolIdx = 0; }
  const item = run.pool[run.poolIdx++];
  run.itemStart = performance.now();
  run.itemMs = state.refresh;
  run.typed = false;

  const isMc = MC_CATS.includes(run.category);
  const fullText = isMc ? item.q : item.text;
  const stage = document.getElementById('stage');

  if(isMc){
    stage.innerHTML = `
      <div class="trivia-box">
        <div class="trivia-q" id="mainText"><span class="cursor">|</span></div>
        <div class="trivia-choices">
          ${item.choices.map((c,i)=>`<div class="choice" data-i="${i}">${c}</div>`).join('')}
        </div>
      </div>`;
  } else {
    stage.innerHTML = `
      <div class="text-box">
        <div class="text-main" id="mainText"><span class="cursor">|</span></div>
        <div class="text-answer" id="answerEl">${item.answer}</div>
      </div>`;
  }

  typeWriter(fullText, state.refresh);
  run.currentItem = item;
}

function typeWriter(fullText, refreshMs){
  const el = document.getElementById('mainText');
  const available = Math.max(500, refreshMs - 5000);
  const perChar = Math.min(40, available / Math.max(1,fullText.length));
  let i = 0;
  clearInterval(run.typeTimer);
  run.typeTimer = setInterval(()=>{
    i++;
    if(!el) { clearInterval(run.typeTimer); return; }
    el.innerHTML = escapeHtml(fullText.slice(0,i)) + '<span class="cursor">|</span>';
    if(i>=fullText.length){
      clearInterval(run.typeTimer);
      run.typed = true;
      el.innerHTML = escapeHtml(fullText);
    }
  }, perChar);
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function updateItemReveal(itemRemaining){
  const reveal = itemRemaining<=5000;
  if(reveal && !run.typed){
    clearInterval(run.typeTimer);
    run.typed = true;
    const el = document.getElementById('mainText');
    const item = run.currentItem;
    if(el && item) el.innerHTML = escapeHtml(MC_CATS.includes(run.category)?item.q:item.text);
  }
  if(!reveal) return;
  if(MC_CATS.includes(run.category)){
    const stage = document.getElementById('stage');
    if(!stage) return;
    stage.querySelectorAll('.choice').forEach(ch=>{
      const idx = +ch.dataset.i;
      ch.classList.toggle('correct', idx===run.currentItem.correct);
      ch.classList.toggle('dim', idx!==run.currentItem.correct);
    });
  } else {
    const ans = document.getElementById('answerEl');
    if(ans) ans.classList.add('show');
  }
}

/* ---- video categories ---- */
function renderVideo(){
  const list = run.videoList;
  const current = list[run.videoIdx];
  const rest = list.slice(run.videoIdx+1).concat(list.slice(0,run.videoIdx));
  const src = `https://www.youtube.com/embed/${current}?autoplay=1&mute=0&playlist=${rest.join(',')}&controls=1&rel=0`;
  document.getElementById('stage').innerHTML =
    `<div class="video-wrap"><iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
}

/* ---- visuals: breathing ring ---- */
function renderVisual(){
  const stage = document.getElementById('stage');
  stage.innerHTML = `<canvas id="visualCanvas"></canvas>`;
  const canvas = document.getElementById('visualCanvas');
  const ctx = canvas.getContext('2d');

  function resize(){
    const dpr = window.devicePixelRatio||1;
    const w = canvas.clientWidth || window.innerWidth;
    const h = canvas.clientHeight || window.innerHeight;
    canvas.width = w*dpr;
    canvas.height = h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  requestAnimationFrame(resize);
  window.addEventListener('resize', resize);

  function draw(){
    if(!document.body.contains(canvas)) return;
    const w = canvas.clientWidth, h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);
    const t = (performance.now()-run.visualStart)/1000;
    const phase = (Math.sin(t * (2*Math.PI/8)) + 1)/2; // 8s period
    const maxR = Math.min(w,h)*0.32;
    const minR = maxR*0.35;
    const r = minR + (maxR-minR)*phase;
    const grad = ctx.createRadialGradient(w/2,h/2,r*0.2,w/2,h/2,r);
    grad.addColorStop(0,'rgba(108,140,255,0.55)');
    grad.addColorStop(1,'rgba(108,140,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(w/2,h/2,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(143,108,255,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w/2,h/2,r,0,Math.PI*2); ctx.stroke();
    if(run.active && run.category==='visuals') requestAnimationFrame(draw);
  }
  draw();
}

renderSetup();
})();
